<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교사 대시보드 - Market Sentiment Meter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        * { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col">
    <header class="bg-gray-800 border-b border-gray-700 py-4 px-6 flex justify-between items-center shadow-md flex-wrap gap-3">
        <h1 class="text-2xl font-bold text-yellow-400">📊 교사 대시보드</h1>
        <div class="flex items-center gap-3 flex-wrap">
            <div class="text-lg">방 코드: <span id="displayRoomCode" class="font-mono bg-gray-700 px-3 py-1 rounded text-green-400 font-bold tracking-widest text-xl">----</span></div>
            <span id="phaseBadge" class="text-sm font-bold px-3 py-1 rounded-full bg-gray-600 text-gray-300">⏳ 대기 중</span>
            <button id="startTradingBtn" onclick="setPhase('trading')" class="bg-yellow-500 hover:bg-yellow-600 px-4 py-2 rounded font-semibold transition hidden">
                💹 매매 단계 시작
            </button>
            <button id="endTradingBtn" onclick="setPhase('ended')" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded font-semibold transition hidden">
                🏁 평가 종료
            </button>
            <!-- 세션 저장 버튼 -->
            <button id="saveSessionBtn" class="bg-green-700 hover:bg-green-600 px-4 py-2 rounded font-semibold transition">
                💾 세션 저장
            </button>
            <!-- 결과 내보내기 버튼 -->
            <button id="exportExcelBtn" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded font-semibold transition">
                📥 결과 다운로드
            </button>
        </div>
    </header>

    <main class="flex-grow p-6 flex flex-col lg:flex-row gap-6">
        <!-- 메인 대시보드 (차트 및 컨트롤) -->
        <section class="flex-grow space-y-6">
            <div class="bg-gray-800 p-6 rounded-xl shadow-lg">
                <h2 class="text-xl font-semibold mb-4 text-blue-300">📈 실시간 주가 차트 (기준: $100.00)</h2>
                <div class="relative h-96 w-full">
                    <canvas id="stockChart"></canvas>
                </div>
            </div>

            <div class="bg-gray-800 p-6 rounded-xl shadow-lg">
                <h2 class="text-xl font-semibold mb-4 text-blue-300">🏢 모둠 제어 및 주가 현황</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-gray-600">
                                <th class="p-3">모둠명</th>
                                <th class="p-3">현재 주가</th>
                                <th class="p-3">📈 매수</th>
                                <th class="p-3">⏸ 관망</th>
                                <th class="p-3">📉 매도</th>
                                <th class="p-3">발표 제어</th>
                            </tr>
                        </thead>
                        <tbody id="teamListBody">
                            <!-- JS로 동적 생성 -->
                        </tbody>
                    </table>
                </div>
            </div>
            
            <!-- 접속 학생 목록 -->
            <div class="bg-gray-800 p-6 rounded-xl shadow-lg flex flex-col" style="min-height:12rem;">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold text-green-300">👨‍🎓 접속 학생</h2>
                    <span id="studentCount" class="bg-gray-700 text-sm px-2 py-1 rounded-full">0명</span>
                </div>
                <div id="studentList" class="flex-grow overflow-y-auto space-y-2 pr-2" style="max-height:200px;">
                    <!-- JS로 동적 생성 -->
                </div>
            </div>
        </section>

        <!-- 사이드바 (실시간 의견) -->
        <aside class="w-full lg:w-80 space-y-6 flex-shrink-0">
            <div class="bg-gray-800 p-6 rounded-xl shadow-lg h-full max-h-[800px] flex flex-col">
                <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
                    <h2 class="text-xl font-semibold text-blue-300">💬 투자 의견 및 분석 보고서</h2>
                    <div id="chatTabs" class="flex flex-wrap gap-2">
                        <button onclick="filterChat('all')" class="chat-tab-btn active-tab px-3 py-1 rounded text-sm bg-blue-600" data-tab="all">전체</button>
                        <!-- 모둠별 탭은 JS에서 동적 생성 -->
                    </div>
                </div>
                <div id="chatBox" class="flex-grow overflow-y-auto space-y-2 bg-gray-900 p-3 rounded">
                    <!-- 채팅 메시지 표시 영역 -->
                </div>
            </div>
        </aside>
    </main>

    <footer class="bg-gray-800 border-t border-gray-700 text-center py-4 text-sm text-gray-400 mt-auto">
        <p>만든 사람: 경기도 지구과학 교사 뀨짱</p>
        <p class="mt-1">
            <a href="https://open.kakao.com/o/s7hVU65h" target="_blank" class="text-blue-400 hover:underline">문의: 카카오톡 오픈채팅</a> |
            <a href="https://eduarchive.tistory.com/" target="_blank" class="text-blue-400 hover:underline">블로그: 뀨짱쌤의 교육자료 아카이브</a>
        </p>
    </footer>

    <script src="/js/teacher.js"></script>
</body>
</html>
