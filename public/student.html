<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생 참여 - 위기 관리 모의투자</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col">
    <header class="bg-gray-800 border-b border-gray-700 py-3 px-4 flex justify-between items-center shadow-md sticky top-0 z-10">
        <div>
            <h1 class="text-lg font-bold text-green-400">📈 모의투자</h1>
            <div class="text-xs text-gray-400" id="studentInfo">---- / ---</div>
        </div>
        <div class="flex items-center gap-3">
            <!-- 게임 단계 배지 -->
            <span id="phaseBadge" class="text-xs font-bold px-2 py-1 rounded-full bg-gray-600 text-gray-300">⏳ 대기 중</span>
            <div class="text-right">
                <div class="text-xs text-gray-400">내 현금 잔고</div>
                <div class="text-xl font-mono font-bold text-yellow-300" id="myCash">0원</div>
            </div>
        </div>
    </header>

    <main class="flex-grow p-4 space-y-4">
        <!-- 대기 안내 배너 (발표 전 / 매매 종료 후) -->
        <section id="waitingBanner" class="bg-gray-700 p-4 rounded-xl text-center text-gray-300 hidden">
            <p id="waitingMsg" class="text-lg">⏳ 교사의 안내를 기다려주세요.</p>
        </section>

        <!-- 현재 발표 중 UI (발표 단계에만 표시) -->
        <section id="presentationSection" class="bg-gray-800 p-4 rounded-xl shadow-lg border border-blue-500 hidden relative overflow-hidden">
            <div class="absolute top-0 right-0 bg-blue-500 text-white text-xs font-bold px-2 py-1 rounded-bl-lg animate-pulse">발표 중</div>
            <h2 class="text-lg font-semibold mb-2 text-blue-300">🎤 현재 발표: <span id="currentTeamName" class="text-white">---</span></h2>
            
            <div class="flex gap-4 mb-4">
                <button id="voteUpBtn" onclick="vote('up')" class="flex-1 bg-green-600 hover:bg-green-700 py-4 rounded-xl font-bold text-2xl transition shadow-lg active:scale-95">👍 긍정</button>
                <button id="voteDownBtn" onclick="vote('down')" class="flex-1 bg-red-600 hover:bg-red-700 py-4 rounded-xl font-bold text-2xl transition shadow-lg active:scale-95">👎 부정</button>
            </div>
            
            <form id="voteReasonForm" class="flex gap-2">
                <input type="text" id="voteReason" class="flex-grow bg-gray-700 rounded-lg p-2 text-white text-sm" placeholder="의견을 입력하고 전송하세요" autocomplete="off">
                <button type="submit" class="bg-blue-600 px-4 py-2 rounded-lg font-bold text-sm">전송</button>
            </form>
            <div id="voteMessage" class="text-xs text-red-400 mt-2 hidden"></div>
        </section>

        <!-- 매매 단계 안내 배너 -->
        <section id="tradingBanner" class="bg-yellow-900 border border-yellow-500 p-4 rounded-xl text-center hidden">
            <p class="text-yellow-300 font-bold text-lg">💹 지금은 주식 매매 시간입니다!</p>
            <p class="text-yellow-400 text-sm mt-1">아래에서 매수/매도 버튼을 눌러 거래하세요.</p>
        </section>

        <!-- 매매 종료 안내 배너 -->
        <section id="endedBanner" class="bg-red-900 border border-red-500 p-4 rounded-xl text-center hidden">
            <p class="text-red-300 font-bold text-lg">🏁 모의투자가 종료되었습니다!</p>
            <p class="text-red-400 text-sm mt-1">최종 결과를 확인하세요.</p>
        </section>

        <!-- 내 포트폴리오 및 시장 현황 -->
        <section class="bg-gray-800 p-4 rounded-xl shadow-lg">
            <h2 class="text-lg font-semibold mb-4 text-green-300">💼 시장 및 내 포트폴리오</h2>
            <div class="space-y-4" id="portfolioList">
                <!-- JS로 동적 생성 -->
            </div>
        </section>
    </main>

    <footer class="bg-gray-800 border-t border-gray-700 text-center py-4 text-sm text-gray-400 mt-auto">
        <p>만든 사람: 경기도 지구과학 교사 뀨짱</p>
        <p class="mt-1">
            <a href="https://open.kakao.com/o/s7hVU65h" target="_blank" class="text-blue-400 hover:underline">문의: 카카오톡 오픈채팅</a> |
            <a href="https://eduarchive.tistory.com/" target="_blank" class="text-blue-400 hover:underline">블로그: 뀨짱쌤의 교육자료 아카이브</a>
        </p>
    </footer>

    <!-- 매수/매도 모달 -->
    <div id="tradeModal" class="fixed inset-0 bg-black bg-opacity-75 hidden items-center justify-center z-50 p-4">
        <div class="bg-gray-800 p-6 rounded-xl shadow-2xl w-full max-w-sm border border-gray-600">
            <h2 class="text-xl font-bold mb-4" id="modalTitle">매매하기</h2>
            <p class="text-sm text-gray-300 mb-4">현재가: <span id="modalPrice" class="font-mono text-yellow-300 font-bold"></span>원</p>
            
            <div class="flex gap-2 mb-4">
                <button onclick="setTradeAmount(1)" class="flex-1 bg-gray-700 py-2 rounded">+1주</button>
                <button onclick="setTradeAmount(5)" class="flex-1 bg-gray-700 py-2 rounded">+5주</button>
                <button onclick="setTradeAmount(10)" class="flex-1 bg-gray-700 py-2 rounded">+10주</button>
            </div>
            
            <div class="mb-4">
                <label class="block text-sm mb-1 text-gray-400">수량</label>
                <div class="flex">
                    <input type="number" id="tradeAmount" class="w-full bg-gray-700 rounded-l p-2 text-white font-mono text-lg text-center" value="1" min="1">
                    <span class="bg-gray-600 p-2 rounded-r flex items-center">주</span>
                </div>
            </div>

            <p class="text-sm text-gray-400 mb-6 text-right">예상 금액: <span id="modalTotal" class="font-mono text-white font-bold"></span>원</p>

            <div class="flex gap-4">
                <button id="buyBtn" class="flex-1 bg-red-600 hover:bg-red-700 py-3 rounded font-bold text-lg shadow-lg active:scale-95">매수</button>
                <button id="sellBtn" class="flex-1 bg-blue-600 hover:bg-blue-700 py-3 rounded font-bold text-lg shadow-lg active:scale-95">매도</button>
            </div>
            <button onclick="closeModal()" class="w-full mt-4 text-gray-400 hover:text-white text-sm py-2">취소</button>
        </div>
    </div>

    <script src="/js/student.js"></script>
</body>
</html>
